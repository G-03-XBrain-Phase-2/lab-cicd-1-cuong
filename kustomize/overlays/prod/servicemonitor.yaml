apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheus-canary-demo-monitor
  namespace: prod
  labels:
    release: kube-prometheus-stack
spec:
  endpoints:
  - interval: 15s
    path: /metrics
    port: http
  selector:
    matchLabels:
      app: prometheus-canary-demo
