apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
# Tự động sinh ConfigMap cho Dev
configMapGenerator:
- behavior: create
  literals:
  - VERSION="dev-1.0.0"
  - ENVIRONMENT="dev"
  name: app-config
generatorOptions:
  disableNameSuffixHash: true
patches:
- path: patches.yaml
images:
- name: prometheus-canary-demo-placeholder
  newName: manhcuong139/prometheus-canary-demo
  newTag: 1057d0c0db9d65a35b0442c47def8c23af3b549c
