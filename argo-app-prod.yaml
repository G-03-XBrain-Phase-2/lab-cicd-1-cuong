apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-demo-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/G-03-XBrain-Phase-2/lab-cicd-1-cuong'
    targetRevision: HEAD
    path: kustomize/overlays/prod # Điểm đến thư mục prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod # Deploy vào namespace prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

