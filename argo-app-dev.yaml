apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-demo-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/G-03-XBrain-Phase-2/lab-cicd-1-cuong'
    targetRevision: dev
    path: kustomize/overlays/dev # Điểm đến thư mục dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev # Deploy vào namespace dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

